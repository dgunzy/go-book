name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: cabot_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cabot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Go source
        run: make verify

      - name: Run race tests
        run: go test -race ./...

      - name: Build application
        run: go build ./cmd/cabot

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Verify PostgreSQL migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/cabot_test?sslmode=disable
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGDATABASE: cabot_test
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          psql -1 -v ON_ERROR_STOP=1 -f migrations/000001_initial.up.sql
          psql -1 -v ON_ERROR_STOP=1 -f migrations/000001_initial.down.sql
          go run ./cmd/cabot migrate
          go run ./cmd/cabot migrate
          test "$(psql -Atqc "
            SELECT
              (SELECT count(*) FROM schema_migrations) || '|' ||
              (SELECT count(*) FROM players) || '|' ||
              (SELECT count(*) FROM events) || '|' ||
              (SELECT count(*) FROM legacy_stat_snapshots) || '|' ||
              (SELECT count(*) FROM media_assets) || '|' ||
              (SELECT count(*) FROM media_player_links) || '|' ||
              (SELECT count(*) FROM legacy_import_records)
          ")" = "1|23|6|23|22|23|74"
          psql -1 -v ON_ERROR_STOP=1 -f migrations/000001_initial.down.sql
          psql -v ON_ERROR_STOP=1 -c 'DROP TABLE schema_migrations'

  container:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate immutable image tag
        id: image
        shell: bash
        run: echo "tag=$(date -u +%Y%m%dT%H%M%SZ)-sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/dgunzy/cabot-cup:${{ steps.image.outputs.tag }}
            ghcr.io/dgunzy/cabot-cup:sha-${{ github.sha }}
            ghcr.io/dgunzy/cabot-cup:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
